<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cream: #f5f0e8; --parchment: #e8dfc8; --oak: #6b4c2a; --dark: #1a1208;
            --gold: #c9a84c; --gold-light: #e8c96a; --ink: #2c1f0e;
            --panel-bg: rgba(26, 18, 8, 0.95); --panel-border: rgba(201, 168, 76, 0.6);
        }
        body { background: var(--dark); color: var(--cream); font-family: 'Cormorant Garamond', Georgia, serif; min-height: 100vh; overflow-x: hidden; }
        .screen { display: none; }
        .screen.active { display: block; }
        header { text-align: center; padding: 3rem 2rem 2rem; background: linear-gradient(to bottom, #0d0a04, var(--dark)); border-bottom: 1px solid rgba(201,168,76,0.25); }
        header::before { content: ''; display: block; width: 80px; height: 1px; background: var(--gold); margin: 0 auto 1.2rem; opacity: 0.7; }
        .property-name { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 2.5vw, 1.3rem); letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 400; margin-bottom: 0.5rem; }
        h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; color: var(--cream); line-height: 1.1; margin-bottom: 1rem; }
        .subtitle { font-size: 1.1rem; color: rgba(245,240,232,0.55); font-style: italic; font-weight: 300; letter-spacing: 0.05em; }
        .lobby { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
        .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .room-card { position: relative; cursor: pointer; border: 1px solid rgba(201,168,76,0.25); background: rgba(255,255,255,0.02); padding: 2rem 1.8rem 1.6rem; transition: all 0.3s; overflow: hidden; }
        .room-card:hover { border-color: rgba(201,168,76,0.6); background: rgba(201,168,76,0.04); transform: translateY(-4px); }
        .room-card-preview { width: 100%; height: 120px; margin-bottom: 1.3rem; opacity: 0.8; object-fit: cover; display: block; border: 1px solid rgba(201,168,76,0.2); }
        .room-card-name { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--cream); margin-bottom: 0.5rem; }
        .room-header { text-align: center; padding: 2.5rem 2rem 2rem; background: linear-gradient(to bottom, #0d0a04, var(--dark)); border-bottom: 1px solid rgba(201,168,76,0.2); position: relative; }
        .back-btn { position: absolute; left: 2rem; top: 50%; transform: translateY(-50%); background: none; border: 1px solid rgba(201,168,76,0.4); color: var(--gold); padding: 0.5rem 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; }
        .wall-container { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
        .section-label { font-family: 'Playfair Display', serif; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 2rem; margin-top: 2rem; display: flex; align-items: center; gap: 1rem; }
        .section-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.2); }
        .wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 3rem 2.5rem; margin-bottom: 4rem; }
        .frame { padding: 12px; background: linear-gradient(135deg, #8B6914 0%, #c9a84c 25%, #6b4c2a 50%, #c9a84c 75%, #8B6914 100%); box-shadow: 0 8px 30px rgba(0,0,0,0.8); cursor: help; }
        .frame img { width: 100%; height: 220px; object-fit: cover; display: block; }
        .tooltip { position: fixed; z-index: 1000; width: 320px; background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 1.5rem; pointer-events: none; opacity: 0; transition: all 0.2s; backdrop-filter: blur(12px); color: var(--cream); }
        .tooltip.visible { opacity: 1; }

        .lang-btn { background: none; border: 1px solid rgba(201,168,76,0.25); color: rgba(245,240,232,0.45); padding: 0.25rem 0.65rem; cursor: pointer; margin-left: 5px; font-family: 'Cormorant Garamond'; }
        .lang-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.1); }

function init() {
    renderLobby();
    renderLangSelectors();
    updateText();
    setupTooltip();
}

function renderLangSelectors() {
    const container = document.getElementById('lang-selectors');
    container.innerHTML = '';
    Object.keys(i18n).forEach(lang => {
        const btn = document.createElement('button');
        btn.className = `lang-btn ${lang === currentLang ? 'active' : ''}`;
        btn.innerText = lang.toUpperCase();
        btn.onclick = (e) => setLanguage(lang, e);
        container.appendChild(btn);
    });
}

function setLanguage(lang, event) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    updateText();
    renderLobby();
    if (currentRoomId) renderRoom(currentRoomId);
}

function updateText() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        el.innerText = i18n[currentLang][key] || i18n['en'][key];
    });
}

function renderLobby() {
    const grid = document.getElementById('rooms-grid');
    grid.innerHTML = '';
    ROOMS.forEach(room => {
        const card = document.createElement('div');
        card.className = 'room-card';
        card.onclick = () => renderRoom(room.id);
        card.innerHTML = `
            <img src="${room.previewImg}" class="room-card-preview" alt="">
            <div class="room-card-name">${room.name[currentLang] || room.name['en']}</div>
            <div style="font-size:0.8rem; color:var(--gold); opacity:0.8;">${i18n[currentLang].enterRoom}</div>
        `;
        grid.appendChild(card);
    });
}

function renderRoom(roomId) {
    currentRoomId = roomId;
    const room = ROOMS.find(r => r.id === roomId);
    document.getElementById('screen-lobby').classList.remove('active');
    document.getElementById('screen-room').classList.add('active');
    document.getElementById('room-header-title').innerText = room.name[currentLang] || room.name['en'];
    
    const container = document.getElementById('wall-container');
    container.innerHTML = '';

    room.sections.forEach(section => {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.innerHTML = `<span>${section.artist}</span>`;
        container.appendChild(label);

        const wall = document.createElement('div');
        wall.className = 'wall';
        section.works.forEach(work => {
            const item = document.createElement('div');
            item.className = 'frame';
            item.innerHTML = `<img src="${work.img}" alt="">`;
            item.onmouseenter = (e) => showTooltip(e, work, section.artist);
            item.onmouseleave = hideTooltip;
            wall.appendChild(item);
        });
        container.appendChild(wall);
    });
    window.scrollTo(0,0);
}

function goToLobby() {
    currentRoomId = null;
    document.getElementById('screen-room').classList.remove('active');
    document.getElementById('screen-lobby').classList.add('active');
}

function setupTooltip() {
    const tt = document.getElementById('tooltip');
    document.addEventListener('mousemove', (e) => {
        if (tt.classList.contains('visible')) {
            const x = e.clientX + 20;
            const y = e.clientY + 20;
            const w = window.innerWidth;
            tt.style.left = (x + 320 > w ? e.clientX - 340 : x) + 'px';
            tt.style.top = y + 'px';
        }
    });
}

function showTooltip(e, work, artist) {
    const tt = document.getElementById('tooltip');
    document.getElementById('tt-title').innerText = work.title[currentLang] || work.title['en'];
    document.getElementById('tt-artist').innerText = `${artist}, ${work.date}`;
    document.getElementById('tt-body').innerText = work.body[currentLang] || work.body['en'];
    tt.classList.add('visible');
}

function hideTooltip() {
    document.getElementById('tooltip').classList.remove('visible');
}

init();
</script>

</body>
</html>
